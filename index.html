<!DOCTYPE html><html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursedfiber78</title><style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #141414;
        color: white;
    }

    header {
        padding: 20px 40px;
        font-size: 32px;
        font-weight: bold;
    }

    .main-container {
        padding: 0 40px 40px 40px;
    }

    .player {
        width: 100%;
        height: 60vh;
        background: black;
        border-radius: 15px;
        overflow: hidden;
        margin-bottom: 30px;
        box-shadow: 0 0 30px rgba(0,0,0,0.7);
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }

    .row-title {
        font-size: 22px;
        margin: 25px 0 10px 0;
    }

    .cards {
        display: flex;
        gap: 15px;
        overflow-x: auto;
        padding-bottom: 10px;
    }

    .card {
        min-width: 240px;
        height: 140px;
        border-radius: 10px;
        overflow: hidden;
        cursor: pointer;
        transition: 0.3s;
        position: relative;
    }

    .card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .card:hover {
        transform: scale(1.1);
    }

    .card-title {
        position: absolute;
        bottom: 0;
        background: linear-gradient(transparent, rgba(0,0,0,0.8));
        width: 100%;
        padding: 10px;
        font-weight: bold;
    }

    .profile {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 20px;
    }

    .profile img {
        width: 60px;
        height: 60px;
        border-radius: 50%;
    }

    .profile-name {
        font-size: 24px;
        font-weight: bold;
    }
</style>

</head>
<body><header>
    🎬 CURSEADO
</header><div class="main-container"><!-- PERFIL -->
<div class="profile">
    <img src="https://kick.com/img/default-user-profile.png">
    <div class="profile-name">Cursedfiber78</div>
</div>

<!-- STREAM -->
<div class="player">
    <iframe id="stream" src="https://player.kick.com/cursedfiber78" allowfullscreen></iframe>
</div>

<!-- OPCIONES -->
<div class="row-title">Contenido</div>
<div class="cards">

    <div class="card" onclick="loadStream()">
        <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
        <div class="card-title">Ver Stream en Vivo</div>
    </div>

    <div class="card" onclick="openVods()">
        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb">
        <div class="card-title">Ver VODs</div>
    </div>

    <div class="card" onclick="openChannel()">
        <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
        <div class="card-title">Canal de Kick</div>
    </div>

</div>

</div><script>
function loadStream() {
    document.getElementById('stream').src = "https://player.kick.com/cursedfiber78";
}

function openVods() {
    window.open("https://kick.com/cursedfiber78/videos", '_blank');
}

function openChannel() {
    window.open("https://kick.com/cursedfiber78", '_blank');
}
</script></body>
</html>
