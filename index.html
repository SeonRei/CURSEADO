<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CURSEADO Streams</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #141414;
            color: white;
        }

        header {
            padding: 20px 40px;
            font-size: 28px;
            font-weight: bold;
        }

        .main-container {
            padding: 0 40px 40px 40px;
        }

        .player {
            width: 100%;
            height: 60vh;
            background: black;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .row-title {
            font-size: 22px;
            margin: 20px 0 10px 0;
        }

        .cards {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .card {
            min-width: 220px;
            height: 130px;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card:hover {
            transform: scale(1.1);
        }

        .card-title {
            position: absolute;
            bottom: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            width: 100%;
            padding: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    🎬 CURSEADO Streams
</header>

<div class="main-container">

    <div class="player">
        <iframe id="stream" src="https://player.kick.com/cursedfiber78" allowfullscreen></iframe>
    </div>

    <div class="row-title">En vivo</div>
    <div class="cards">

        <div class="card" onclick="changeStream('cursedfiber78')">
            <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
            <div class="card-title">Cursedfiber78</div>
        </div>

        <div class="card" onclick="changeStream('xqc')">
            <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
            <div class="card-title">xQc</div>
        </div>

        <div class="card" onclick="changeStream('adinross')">
            <img src="https://images.unsplash.com/photo-1493711662062-fa541adb3fc8">
            <div class="card-title">Adin Ross</div>
        </div>

        <div class="card" onclick="changeStream('trainwreckstv')">
            <img src="https://images.unsplash.com/photo-1486572788966-cfd3df1f5b42">
            <div class="card-title">Trainwrecks</div>
        </div>

    </div>

</div>

<script>
    function changeStream(channel) {
        document.getElementById('stream').src = `https://player.kick.com/${channel}`;
    }
</script>

</body>
  </html>
