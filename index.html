<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cursedfiber78</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0f0f0f;
            color: white;
        }

        .banner {
            background: linear-gradient(to right, #000000, #1a1a1a);
            padding: 40px;
            text-align: center;
        }

        .banner h1 {
            font-size: 48px;
            margin: 10px 0;
        }

        .status {
            font-size: 20px;
            margin-bottom: 20px;
        }

        .live {
            color: #53fc18;
        }

        .offline {
            color: red;
        }

        .buttons {
            margin-top: 20px;
        }

        .buttons button {
            background-color: #9147ff;
            border: none;
            padding: 12px 20px;
            margin: 5px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
        }

        .buttons button:hover {
            background-color: #7a39d6;
        }

        .player {
            display: flex;
            justify-content: center;
            margin: 30px;
        }

        iframe {
            border-radius: 10px;
        }

        .section {
            padding: 20px;
        }

        .cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background-color: #1c1c1c;
            padding: 20px;
            border-radius: 10px;
            width: 200px;
            transition: 0.3s;
            cursor: pointer;
            text-align: center;
        }

        .card:hover {
            background-color: #2a2a2a;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="banner">
        <h1>Cursedfiber78</h1>
        <div id="status" class="status">Cargando estado...</div>

        <div class="buttons">
            <button onclick="loadLive()">Ver en vivo</button>
            <button onclick="loadVods()">Ver VODs</button>
            <button onclick="goToKick()">Canal Kick</button>
        </div>
    </div>

    <div class="player">
        <iframe id="player" 
            src="https://player.kick.com/cursedfiber78" 
            height="500" 
            width="900" 
            allowfullscreen>
        </iframe>
    </div>

    <div class="section">
        <h2>Contenido</h2>
        <div class="cards">
            <div class="card" onclick="loadLive()">🔴 Stream en vivo</div>
            <div class="card" onclick="loadVods()">🎬 VODs</div>
            <div class="card" onclick="goToKick()">📺 Canal Kick</div>
        </div>
    </div>

    <script>
        function loadLive() {
            document.getElementById("player").src = "https://player.kick.com/cursedfiber78";
        }

        function loadVods() {
            window.open("https://kick.com/cursedfiber78/videos", "_blank");
        }

        function goToKick() {
            window.open("https://kick.com/cursedfiber78", "_blank");
        }

        // Estado simple (simulado)
        function checkLive() {
            // Esto es visual solamente
            // Si quieres luego intentamos hacerlo real con API
            let status = document.getElementById("status");
            let isLive = true; // Cambia a false si quieres probar offline

            if (isLive) {
                status.innerHTML = "🟢 EN VIVO";
                status.className = "status live";
            } else {
                status.innerHTML = "🔴 OFFLINE";
                status.className = "status offline";
            }
        }

        checkLive();
    </script>

</body>
</html>
